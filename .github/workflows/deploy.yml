# Deploy to Railway
# Automated deployment on push to main
# Tests must pass before deployment

name: Deploy to Railway

on:
  push:
    branches: [main]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run check

      - name: Run tests
        run: npm run test

      - name: Build project
        run: npm run build

  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service=contours

      - name: Notify success
        if: success()
        run: |
          echo "✓ Deployed to Railway successfully"
          echo "→ Check dashboard: https://railway.app/dashboard"

      - name: Notify failure
        if: failure()
        run: |
          echo "✗ Deployment failed"
          echo "→ Check logs: https://railway.app/dashboard"
